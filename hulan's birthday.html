<body style="margin:0;background:#1a1530;">
<style>
.hb-scope *{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;}
.hb-scope{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
.bd-wrap{position:relative;width:100%;max-width:680px;margin:0 auto;min-height:100vh;overflow:hidden;background:#1a1530;display:flex;flex-direction:column;align-items:center;padding:34px 20px 44px;text-align:center;}
.bd-stars{position:absolute;inset:0;pointer-events:none;}
.bd-star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.7;animation:tw 2.4s ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:.9;transform:scale(1.2)}}
.bd-balloon{position:absolute;bottom:-150px;width:42px;height:54px;border-radius:50% 50% 48% 48%;animation:flo linear infinite;opacity:.9;}
.bd-balloon::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid inherit;}
.bd-balloon::before{content:"";position:absolute;bottom:-86px;left:50%;width:1px;height:86px;background:rgba(255,255,255,.3);}
@keyframes flo{0%{transform:translateY(0)}50%{transform:translateY(-320px)}100%{transform:translateY(-680px);opacity:0}}
.bd-title{position:relative;color:#ffe27a;font-size:28px;font-weight:600;margin:4px 0 2px;text-shadow:0 2px 12px rgba(255,200,60,.35);z-index:3;}
.bd-name{position:relative;font-size:23px;font-weight:600;margin:0 0 16px;z-index:3;background:linear-gradient(90deg,#ff9ecf,#ffd166,#7ec8ff,#ff9ecf);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sh 4s linear infinite;}
@keyframes sh{to{background-position:300% 0}}
.photos{position:relative;z-index:3;display:flex;flex-direction:row;gap:12px;justify-content:center;align-items:flex-start;flex-wrap:wrap;margin:4px 0 12px;width:100%;}
.pomly{background:#fff;padding:7px 7px 24px;border-radius:4px;box-shadow:0 8px 22px rgba(0,0,0,.5);}
.pomly.portrait{width:122px;transform:rotate(-4deg);}
.pomly.wide{width:200px;transform:rotate(3deg);}
.photo{width:108px;height:122px;border-radius:2px;background:#2a2440 center/cover no-repeat;overflow:hidden;}
.photo-wide{display:block;width:100%;height:auto;border-radius:2px;}
.pocap{font-size:13px;color:#5a4a6a;margin-top:8px;font-style:italic;}
.bd-msg{position:relative;color:#fff0f6;font-size:16px;line-height:1.85;max-width:420px;margin:8px auto 0;z-index:3;}
.bd-cake{position:relative;width:140px;height:auto;margin:10px auto 2px;z-index:3;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.flame{transform-origin:center bottom;animation:fk .12s ease-in-out infinite alternate;}
@keyframes fk{from{transform:scale(1)}to{transform:scale(1.12,.9) translateY(-1px)}}
.bd-num{font-size:30px;font-weight:600;fill:#fff;}
.bd-btn{position:relative;z-index:3;margin-top:16px;background:#ff7eb6;color:#3a0d28;border:none;padding:13px 30px;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 18px rgba(255,126,182,.5);transition:transform .15s;}
.bd-btn:hover{transform:translateY(-2px)}.bd-btn:active{transform:scale(.94)}
.bd-conf{position:absolute;width:10px;height:15px;opacity:0;z-index:6;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(720px) rotate(720deg);opacity:0}}
.flash{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,225,140,.5),transparent 60%);opacity:0;z-index:4;pointer-events:none;}
.flash.go{animation:fa .7s ease-out;}
@keyframes fa{0%{opacity:0;transform:scale(.4)}30%{opacity:1}100%{opacity:0;transform:scale(1.4)}}
</style>

<script>
(function(){
  var stars=document.getElementById('bdStars');
  for(var i=0;i<48;i++){var s=document.createElement('div');s.className='bd-star';s.style.left=(Math.floor((i*37)%100))+'%';s.style.top=(Math.floor((i*53)%80))+'%';s.style.animationDelay=((i%10)*0.24)+'s';stars.appendChild(s);}
  var flash=document.getElementById('bdFlash');
  var wrap=document.getElementById('bdWrap');
  var colors=['#ff7eb6','#7ec8ff','#ffd166','#b388ff','#6dffb5','#ff9e7e','#ffe27a'];
  function burst(){
    flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');
    for(var i=0;i<130;i++){
      (function(i){
        var c=document.createElement('div');c.className='bd-conf';
        var center=i%2===0;
        c.style.left=center?'50%':(Math.floor((i*((i%13)+3))%100))+'%';
        c.style.top=center?'42%':'-12px';
        c.style.background=colors[i%colors.length];
        c.style.borderRadius=(i%3?'50%':'2px');
        wrap.appendChild(c);
        if(center){
          var ang=(i*30)%360,dist=140+(i%9)*24;
          var dx=Math.round(Math.cos(ang*Math.PI/180)*dist),dy=Math.round(Math.sin(ang*Math.PI/180)*dist);
          c.animate([{transform:'translate(-50%,-50%) rotate(0)',opacity:1},{transform:'translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px)) rotate(540deg)',opacity:0}],{duration:1150+(i%7)*90,easing:'cubic-bezier(.15,.7,.3,1)',fill:'forwards'});
        }else{c.style.animation='fall '+(1.9+(i%10)*0.12)+'s ease-in '+(i%8)*0.05+'s forwards';}
        setTimeout(function(){c.remove();},2800);
      })(i);
    }
  }
  document.getElementById('bdBtn').addEventListener('click',burst);
  setTimeout(burst,300);
})();
</script>
